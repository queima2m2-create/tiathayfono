name: tiathayfono
region: nyc
# App Platform reads this file when the app is created from the repo.
# Declaring `static_sites:` (not `services:`) forces the resource to be a
# free Static Site instead of a paid Web Service — avoids the $24/mo auto-
# detection for Node projects.
static_sites:
  - name: tiathayfono
    environment_slug: node-js
    source_dir: /
    build_command: npm run build
    output_dir: dist
    index_document: index.html
    # SPA fallback — every unknown route serves index.html so React Router can
    # pick up /v2, /v3, etc. without the CDN returning a 404.
    catchall_document: index.html
    github:
      repo: queima2m2-create/tiathayfono
      branch: main
      deploy_on_push: true
    envs:
      - key: VITE_SUPABASE_URL
        scope: BUILD_TIME
